<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>下班倒计时 · 动态壁纸</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;background:#070e14;color:#f6f8fb;
    font-family:'PingFang SC','Helvetica Neue',Arial,sans-serif;user-select:none;}
  body.theme-neon{--main:#39ff14;--accent:#fca311;--bg:#070e14;--bg2:#0b2a2f;}
  body.theme-warm{--main:#ffb454;--accent:#ff6b6b;--bg:#1c130c;--bg2:#3a2a1b;}
  body.theme-mono{--main:#ffffff;--accent:#9aa0a6;--bg:#0f0f0f;--bg2:#1a1a1a;}
  body{background:radial-gradient(ellipse 80% 60% at 50% 30%,var(--bg2) 0%,var(--bg) 74%);}

  #canvas{position:fixed;inset:0;z-index:0;}
  .scanline{position:fixed;inset:0;z-index:2;pointer-events:none;
    background-image:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.02) 3px,rgba(255,255,255,.02) 4px);
    animation:scan 8s linear infinite;}
  @keyframes scan{from{background-position:0 0}to{background-position:0 -80px}}

  /* 三段式：上=状态，中=巨型倒计时，下=爽感信息 */
  #app{position:fixed;inset:0;z-index:3;display:flex;flex-direction:column;
    justify-content:space-between;align-items:center;padding:9vh 6vw 8vh;}
  .zone-top{text-align:center;}
  .zone-mid{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;}
  .zone-bot{display:flex;flex-direction:column;align-items:center;gap:1.6vh;width:100%;}

  .hello{font-size:clamp(15px,4.2vw,28px);font-weight:300;letter-spacing:2px;opacity:.8;}
  .label{margin-top:1vh;font-size:clamp(12px,3.2vw,18px);letter-spacing:.3em;color:rgba(255,255,255,.5);text-transform:uppercase;}
  .phase{margin-top:.8vh;font-size:clamp(12px,3vw,17px);font-weight:600;color:var(--accent);min-height:3vh;}

  .timer{font-family:'Menlo','Consolas','Courier New',monospace;font-size:clamp(66px,18vw,260px);line-height:1;
    color:var(--main);font-variant-numeric:tabular-nums;letter-spacing:.03em;
    text-shadow:0 0 16px color-mix(in srgb,var(--main) 55%,transparent),0 20px 50px rgba(0,0,0,.7);animation:pulse 2s ease-in-out infinite;}
  .timer .sep{color:var(--accent);}
  @keyframes pulse{0%,100%{opacity:.92}50%{opacity:1}}
  .mochiu{margin-top:2.4vh;font-size:clamp(13px,3.6vw,22px);font-weight:600;opacity:.92;text-align:center;padding:0 6vw;min-height:5vh;}

  .chips{display:flex;gap:2.6vw;flex-wrap:wrap;justify-content:center;}
  .chip{border:1.5px solid color-mix(in srgb,var(--main) 40%,transparent);background:color-mix(in srgb,var(--main) 7%,transparent);
    border-radius:999px;padding:1.1vh 4vw;font-size:clamp(11px,3vw,16px);font-weight:700;}
  .chip b{color:var(--main);}
  .prog{width:min(560px,78vw);}
  .prog .pl{display:flex;justify-content:space-between;font-size:clamp(10px,2.4vw,13px);color:rgba(255,255,255,.4);margin-bottom:6px;letter-spacing:.08em;}
  .bar{height:4px;border-radius:999px;background:rgba(255,255,255,.1);overflow:hidden;}
  .fill{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--main),var(--accent));transition:width .8s;width:0;}
  .foot{position:fixed;bottom:2.4vh;left:0;right:0;text-align:center;font-size:clamp(10px,2.4vw,13px);opacity:.4;letter-spacing:2px;z-index:5;}

  /* 下班(超时)态 */
  body.off{background:radial-gradient(ellipse 70% 55% at 50% 32%,#2a0808,#0a0404 76%);}
  body.off .timer{color:#ff5a5a;text-shadow:0 0 18px rgba(255,70,70,.7),0 20px 50px rgba(20,0,0,.8);animation:pulse 1s ease-in-out infinite;}
  body.off .timer .sep{color:#ff9a66;}
  body.off .fill{width:100%!important;background:linear-gradient(90deg,#ff5a5a,#ff9966);}
  .banner{position:fixed;top:clamp(18px,4vh,46px);left:50%;transform:translateX(-50%);z-index:6;
    font-size:clamp(14px,3.6vw,22px);font-weight:800;letter-spacing:.2em;color:#ffbaba;
    text-shadow:0 0 20px rgba(255,80,80,.7);opacity:0;transition:opacity .4s;}
  body.off .banner{opacity:1;animation:jit .5s infinite;}
  @keyframes jit{0%,100%{transform:translateX(-50%)}25%{transform:translateX(calc(-50% + 2px))}75%{transform:translateX(calc(-50% - 2px))}}
  /* 周五特殊态：暖色描边 */
  body.friday:not(.off){--bg2:#2a230b;}
  #barrage{position:fixed;inset:0;z-index:4;pointer-events:none;overflow:hidden;}
  .bi{position:absolute;white-space:nowrap;font-size:clamp(14px,2.2vw,22px);color:#fff;
    background:rgba(200,0,0,.22);border:1px solid rgba(255,60,60,.4);padding:5px 18px;border-radius:999px;animation:fly linear forwards;}
  @keyframes fly{from{transform:translateX(108vw)}to{transform:translateX(-120%)}}

  /* 里程碑 toast */
  .toast{position:fixed;left:50%;bottom:12vh;transform:translateX(-50%);z-index:8;
    background:rgba(0,0,0,.72);border:1px solid color-mix(in srgb,var(--main) 40%,transparent);
    color:#fff;font-size:clamp(13px,3.2vw,18px);font-weight:700;padding:12px 24px;border-radius:999px;
    backdrop-filter:blur(6px);animation:toastIn .3s ease both;}
  @keyframes toastIn{from{opacity:0;transform:translate(-50%,14px)}}

  /* 设壁纸说明 */
  #help{position:fixed;inset:0;z-index:99;background:rgba(4,10,16,.85);backdrop-filter:blur(12px);
    display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.25s;}
  #help.show{opacity:1;pointer-events:all;}
  .hc{background:#11202c;border:1px solid color-mix(in srgb,var(--main) 25%,transparent);border-radius:22px;
    padding:30px 28px;max-width:460px;width:90vw;box-shadow:0 24px 60px rgba(0,0,0,.7);position:relative;}
  .hc h3{font-size:18px;color:var(--main);margin-bottom:6px;}
  .hc p{font-size:13px;color:rgba(255,255,255,.55);margin-bottom:16px;line-height:1.6;}
  .hc .os{font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.1em;margin:14px 0 6px;}
  .hc ol{list-style:decimal;padding-left:20px;font-size:13px;color:rgba(255,255,255,.82);line-height:1.7;}
  .hc a{color:var(--main);text-decoration:none;} .hc a:hover{text-decoration:underline;}
  .hx{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.1);border:0;border-radius:50%;width:28px;height:28px;color:#fff;cursor:pointer;}
  .hbtn{position:fixed;bottom:24px;right:26px;z-index:10;width:38px;height:38px;border-radius:50%;
    border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);font-size:16px;cursor:pointer;backdrop-filter:blur(8px);}
</style>
</head>
<body class="theme-neon">
  <canvas id="canvas"></canvas>
  <div class="scanline"></div>
  <div class="banner" id="banner">🔥 到点了！该撤了！</div>

  <div id="app">
    <div class="zone-top">
      <div class="hello" id="hello"></div>
      <div class="label" id="label">距离下班还有</div>
      <div class="phase" id="phase"></div>
    </div>
    <div class="zone-mid">
      <div class="timer" id="timer">--<span class="sep">:</span>--<span class="sep">:</span>--</div>
      <div class="mochiu" id="mochiu"></div>
    </div>
    <div class="zone-bot">
      <div class="chips" id="chips"></div>
      <div class="prog"><div class="pl"><span>今日工作进度</span><span id="pct">0%</span></div><div class="bar"><div class="fill" id="fill"></div></div></div>
    </div>
  </div>

  <div id="barrage"></div>
  <div class="foot" id="foot">下班倒计时</div>
  <button class="hbtn" onclick="document.getElementById('help').classList.add('show')">?</button>

  <div id="help" onclick="if(event.target.id==='help')this.classList.remove('show')">
    <div class="hc">
      <button class="hx" onclick="document.getElementById('help').classList.remove('show')">✕</button>
      <h3>🖥️ 怎么把它变成壁纸</h3>
      <p>它是个全屏网页，三种用法：</p>
      <div class="os">🍎 Mac 桌面</div>
      <ol><li>App Store 装免费的 <a href="https://apps.apple.com/app/plash/id1494023538" target="_blank" rel="noopener noreferrer">Plash</a></li><li>Plash → Preferences → 把本页网址粘进 URL</li></ol>
      <div class="os">🪟 Windows 桌面</div>
      <ol><li>Microsoft Store 装免费的 <a href="https://apps.microsoft.com/detail/9ntm2qc6qws7" target="_blank" rel="noopener noreferrer">Lively Wallpaper</a></li><li>+ 添加 → 网页 → 粘网址 → 设为壁纸</li></ol>
      <div class="os">📱 手机锁屏 / 动态壁纸</div>
      <ol><li>浏览器全屏打开本页</li><li>录屏 10–15 秒 → 存成视频</li><li>设为手机动态壁纸 / 锁屏</li></ol>
    </div>
  </div>

<script>
  /* ============== 改这里就行 ============== */
  const CONFIG = {
    offTime: "18:00",         // 下班时间 24h
    name: "打工人",            // 称呼，显示「XX，」；留空不显示
    theme: "neon",            // neon 霓虹 / warm 暖色 / mono 极简
    barrageStyle: "hard",     // 下班后弹幕：hard 狠话 / soft 温和
    payday: 10,               // 每月发薪日(几号)，0 = 不显示
    weekend: true,            // 离周末还有几天
    fishMode: true,           // 今日摸鱼计时
    fishStart: "10:00",       // 从几点开始算摸鱼
    fridayMode: true,         // 周五特殊提示
    milestones: true,         // 剩 30/10/5/1 分钟弹提示
    workHours: 8,             // 工作时长(进度条用)
    mochiu: [
      "再忍一下，马上自由",
      "钱多事少离家近不可能，但下班是真的",
      "摸鱼是为了走更长的路",
      "下班的风，一吹就是一辈子",
    ],
  };
  const BARRAGE = {
    hard: ["快滚回家搞副业！","还不走？老板给你加钱了吗？","下班铃响了，别演了","公司不会记你加班的","别卷了，天都黑了","你在坚持啥？KPI 不会感动你","世界在外面等你，桌子拦不住你"],
    soft: ["到点啦，收拾下准备走~","今天辛苦了，该休息了","下班的风等你很久了","工作再多，也别忘了照顾自己","明天再战，今天先撤~","早点回家，给自己放个假"],
  };
  /* ======================================= */

  const $=id=>document.getElementById(id);
  // 主题校验，写错也不白屏
  const THEMES=["neon","warm","mono"];
  const theme=THEMES.includes(CONFIG.theme)?CONFIG.theme:"neon";
  document.body.className="theme-"+theme;
  $('hello').textContent = CONFIG.name ? CONFIG.name+"，" : "";
  const mochiuList = (CONFIG.mochiu&&CONFIG.mochiu.length)?CONFIG.mochiu : ["马上就能下班啦"];
  const barrageList = BARRAGE[CONFIG.barrageStyle] || BARRAGE.soft;

  // 粒子（页面不可见时暂停，省电）
  const cv=$('canvas'), cx=cv.getContext('2d'); let W,H,ps=[],running=true;
  const TC={neon:'57,255,20',warm:'255,180,84',mono:'255,255,255'}[theme];
  function rs(){W=cv.width=innerWidth;H=cv.height=innerHeight;}
  rs(); addEventListener('resize',()=>{rs();initP();});
  document.addEventListener('visibilitychange',()=>{running=!document.hidden;});
  function initP(){const n=Math.min(Math.floor(W*H/9000),150);ps=Array.from({length:n},()=>({x:Math.random()*W,y:Math.random()*H,r:.4+Math.random()*1.8,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.4,a:.12+Math.random()*.4,ph:Math.random()*6.28,ps:.008+Math.random()*.02}));}
  initP();
  function frame(){if(running){cx.clearRect(0,0,W,H);
    for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){const dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d=Math.hypot(dx,dy);if(d<110){cx.beginPath();cx.moveTo(ps[i].x,ps[i].y);cx.lineTo(ps[j].x,ps[j].y);cx.strokeStyle=`rgba(${TC},${(1-d/110)*.06})`;cx.lineWidth=.5;cx.stroke();}}
    for(const p of ps){p.ph+=p.ps;const a=p.a*(.7+.3*Math.sin(p.ph));cx.beginPath();cx.arc(p.x,p.y,p.r,0,6.28);cx.fillStyle=`rgba(${TC},${a})`;cx.fill();p.x+=p.vx;p.y+=p.vy;if(p.x<-10)p.x=W+10;if(p.x>W+10)p.x=-10;if(p.y<-10)p.y=H+10;if(p.y>H+10)p.y=-10;}}
    requestAnimationFrame(frame);}
  frame();

  const pad=n=>String(n).padStart(2,'0');
  const dim=(y,m)=>new Date(y,m+1,0).getDate();
  function daysToWeekend(){const d=new Date().getDay();return(d===0||d===6)?0:6-d;}
  function daysToPayday(){if(!CONFIG.payday)return null;const n=new Date();const today=new Date(n.getFullYear(),n.getMonth(),n.getDate());
    let day=Math.min(CONFIG.payday,dim(n.getFullYear(),n.getMonth()));let p=new Date(n.getFullYear(),n.getMonth(),day);
    if(p<today){const y=n.getFullYear(),m=n.getMonth()+1;day=Math.min(CONFIG.payday,dim(y,m));p=new Date(y,m,day);}
    return Math.round((p-today)/864e5);}
  function fishMin(){const [h,m]=CONFIG.fishStart.split(':').map(Number);const n=new Date(),s=new Date(n);s.setHours(h,m,0,0);return Math.max(0,Math.floor((n-s)/6e4));}

  let lastM=-1, barrageOn=false, lastChipKey=-1, firedMs=new Set(), msDay='';
  function startBarrage(){if(barrageOn)return;barrageOn=true;const add=()=>{if(!barrageOn)return;const el=document.createElement('div');el.className='bi';el.textContent=barrageList[Math.floor(Math.random()*barrageList.length)];el.style.top=(Math.random()*72+6)+'%';el.style.animationDuration=(7+Math.random()*7)+'s';$('barrage').appendChild(el);el.addEventListener('animationend',()=>el.remove());};add();barrageOn=setInterval(add,1300);}
  function stopBarrage(){if(barrageOn){clearInterval(barrageOn);barrageOn=false;$('barrage').innerHTML='';}}
  function toast(t){const el=document.createElement('div');el.className='toast';el.textContent=t;document.body.appendChild(el);setTimeout(()=>el.remove(),3500);}

  function updateChips(){
    const c=[];
    if(CONFIG.weekend){const w=daysToWeekend();c.push(w===0?`<span class="chip">今天就是<b>周末</b>🎉</span>`:`<span class="chip">离周末 <b>${w}</b> 天</span>`);}
    const pd=daysToPayday(); if(pd!=null)c.push(pd===0?`<span class="chip">今天<b>发薪</b>💰</span>`:`<span class="chip">离发薪 <b>${pd}</b> 天</span>`);
    if(CONFIG.fishMode)c.push(`<span class="chip">今日摸鱼 <b>${fishMin()}</b> 分</span>`);
    $('chips').innerHTML=c.join('');
  }

  function tick(){
    const now=new Date(); const [h,m]=CONFIG.offTime.split(':').map(Number);
    const end=new Date(now); end.setHours(h,m,0,0);
    const diff=end-now; const off=diff<=0;
    const ms=Math.abs(diff), hh=Math.floor(ms/3.6e6), mm=Math.floor(ms%3.6e6/6e4), ss=Math.floor(ms%6e4/1000);
    $('timer').innerHTML=`${pad(hh)}<span class="sep">:</span>${pad(mm)}<span class="sep">:</span>${pad(ss)}`;
    $('label').textContent = off ? "已经超时（快撤）" : "距离下班还有";
    document.body.classList.toggle('off',off);
    // 周五
    const fri=now.getDay()===5; document.body.classList.toggle('friday',fri&&CONFIG.fridayMode);
    $('phase').textContent = (CONFIG.fridayMode&&fri&&!off) ? "🍃 周五，空气都变甜了" : "";
    off?startBarrage():stopBarrage();
    // 进度
    const start=end-CONFIG.workHours*3.6e6; const pct=Math.min(100,Math.max(0,Math.round((now-start)/(CONFIG.workHours*3.6e6)*100)));
    $('fill').style.width=pct+'%'; $('pct').textContent=pct+'%';
    // chips 每分钟刷
    const ck=now.getHours()*60+now.getMinutes(); if(ck!==lastChipKey){lastChipKey=ck;updateChips();}
    // 摸鱼文案每10秒
    const idx=Math.floor(Date.now()/10000)%mochiuList.length; if(idx!==lastM){lastM=idx;$('mochiu').textContent="「 "+mochiuList[idx]+" 」";}
    // 里程碑（每天重置）
    if(CONFIG.milestones&&!off){const day=now.toDateString();if(day!==msDay){msDay=day;firedMs.clear();}
      const minsLeft=Math.ceil(diff/6e4);
      for(const t of [30,10,5,1]){ if(minsLeft===t && !firedMs.has(t)){firedMs.add(t); toast(t===1?"最后 1 分钟！手放键盘上别动了":`只剩 ${t} 分钟，准备跑路 🏃`);} }
    }
  }
  tick(); setInterval(tick,500);
  addEventListener('keydown',e=>{if(e.key==='F11'){e.preventDefault();document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen().catch(()=>{});}});
  $('app').addEventListener('dblclick',()=>document.fullscreenElement?document.exitFullscreen():document.documentElement.requestFullscreen().catch(()=>{}));
</script>
</body>
</html>
